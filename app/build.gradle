apply plugin: "com.android.application"

android {
    namespace "com.example.robotjoystick"
    compileSdk 36

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId "com.example.robotjoystick"
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }
}
